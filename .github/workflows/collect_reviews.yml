name: Collect Nebula Reviews

on:
  schedule:
    - cron: '0 7 * * *'  # runs every day at 7:00 AM UTC
  workflow_dispatch:       # allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run review collector
        run: python collect_reviews.py

      - name: Commit and push results
        run: |
          git config --global user.name "nebula-bot"
          git config --global user.email "nebula-bot@github.com"
          git add reviews.csv index.html
          git diff --staged --quiet || git commit -m "Update reviews $(date +'%Y-%m-%d')"
          git push
